{% extends "base.html" %}
{% block content %}
<main class="layout auth-layout">
  <section class="panel auth-panel auth-unified-panel">
    <p class="eyebrow">Create account</p>
    <h1>Register for FetchM Web</h1>
    <p class="lede" id="register-help">Create a private workspace for metadata analysis, sequence downloads, logs, and results.</p>
    <form action="{{ url_for('register') }}" method="post" class="job-form">
      <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
      <label for="username">
        <span>Username</span>
        <input id="username" type="text" name="username" required minlength="3" autocomplete="username" aria-describedby="register-help">
      </label>
      <label for="email">
        <span>Email</span>
        <input id="email" type="email" name="email" required autocomplete="email">
      </label>
      <label for="password">
        <span>Password</span>
        <input id="password" type="password" name="password" required minlength="10" autocomplete="new-password" aria-describedby="password-policy">
      </label>
      <label for="confirm_password">
        <span>Confirm password</span>
        <input id="confirm_password" type="password" name="confirm_password" required minlength="10" autocomplete="new-password" aria-describedby="password-policy">
      </label>
      <p id="password-policy" class="form-note">Use at least 10 characters with at least one letter and one number.</p>
      <button type="submit">Create account</button>
    </form>
    <p class="auth-links">
      <a href="{{ url_for('login') }}">Already have an account? Sign in.</a>
    </p>
  </section>
</main>
{% endblock %}
